# Submission metadata — EDIT EVERY FIELD BELOW MARKED "FILL_ME".
# CI will reject this file if any "FILL_ME" placeholders remain.
method:
  name: FILL_ME                   # must match MyCompactor.name in method.py
  version: 0.1.0
  class_path: submissions/FILL_ME/FILL_ME/method.py:MyCompactor  # handle/method-name

# Runtime configuration used by the evaluation runner.
runtime:
  provider: groq                  # one of: groq, google-ai-studio, ollama, mock
  model: llama-3.3-70b-versatile  # model key the provider accepts
  compression_tier: Elite-Mid     # Elite-Light (>=2x) | Elite-Mid (>=4x) | Elite-Aggressive (>=8x)
  drift_cycles: 2
  case_count_per_template: 20

# Public attribution on the leaderboard.
attribution:
  handle: FILL_ME                 # your GitHub handle (no @)
  org: null                       # optional — null for individuals

# Anything your method-specific config reads at runtime.
method_config: {}
