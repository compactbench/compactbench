<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="CompactBench — benchmark what survives context compaction.">
  <title>CompactBench social preview</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#1A1A1F"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
    <linearGradient id="fade-before" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="fade-after" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5B4FC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A5B4FC" stop-opacity="0.6"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Top badge -->
  <g transform="translate(80, 72)">
    <rect x="-2" y="-18" width="240" height="30" rx="15" fill="none" stroke="#6366F1" stroke-opacity="0.5"/>
    <text x="14" y="3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2" fill="#A5B4FC">OPEN  ·  APACHE  2.0  ·  PY 3.11+</text>
  </g>

  <!-- Wordmark -->
  <g transform="translate(80, 232)">
    <text font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="104" font-weight="800" fill="url(#brand)" letter-spacing="-3">CompactBench</text>
  </g>

  <!-- Tagline -->
  <g transform="translate(82, 320)">
    <text font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="30" font-weight="400" fill="#E5E5E5">The benchmark for LLM context compaction.</text>
    <text y="44" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="300" fill="#9CA3AF">Measures what survives when you replace conversation history</text>
    <text y="74" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="300" fill="#9CA3AF">with a compacted artifact — across multi-cycle drift.</text>
  </g>

  <!-- Visual: before (transcript bars) -> after (compacted blocks) -->
  <g transform="translate(780, 180)">
    <!-- "before" label -->
    <text x="0" y="-16" font-family="ui-monospace, monospace" font-size="13" letter-spacing="2" fill="#6B7280">TRANSCRIPT</text>
    <!-- Transcript bars: 8 uneven rows -->
    <g>
      <rect x="0" y="0" width="170" height="14" rx="3" fill="url(#fade-before)"/>
      <rect x="0" y="24" width="140" height="14" rx="3" fill="url(#fade-before)" opacity="0.9"/>
      <rect x="0" y="48" width="180" height="14" rx="3" fill="url(#fade-before)" opacity="0.85"/>
      <rect x="0" y="72" width="120" height="14" rx="3" fill="url(#fade-before)" opacity="0.8"/>
      <rect x="0" y="96" width="165" height="14" rx="3" fill="url(#fade-before)" opacity="0.75"/>
      <rect x="0" y="120" width="150" height="14" rx="3" fill="url(#fade-before)" opacity="0.7"/>
      <rect x="0" y="144" width="175" height="14" rx="3" fill="url(#fade-before)" opacity="0.65"/>
      <rect x="0" y="168" width="130" height="14" rx="3" fill="url(#fade-before)" opacity="0.6"/>
    </g>

    <!-- Arrow -->
    <g transform="translate(210, 85)">
      <path d="M 0 6 L 60 6 L 52 0 M 60 6 L 52 12" stroke="#6366F1" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="-6" y="-14" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.5" fill="#6366F1">compact</text>
    </g>

    <!-- "after" label -->
    <g transform="translate(300, 0)">
      <text x="0" y="-16" font-family="ui-monospace, monospace" font-size="13" letter-spacing="2" fill="#9CA3AF">ARTIFACT</text>
      <!-- Compressed block: two short bars and a structured-state block -->
      <rect x="0" y="0" width="160" height="14" rx="3" fill="url(#fade-after)"/>
      <rect x="0" y="24" width="120" height="14" rx="3" fill="url(#fade-after)" opacity="0.85"/>
      <!-- Structured state chip -->
      <g transform="translate(0, 56)">
        <rect x="0" y="0" width="160" height="112" rx="6" fill="none" stroke="#A5B4FC" stroke-opacity="0.5" stroke-dasharray="4 3"/>
        <text x="10" y="20" font-family="ui-monospace, monospace" font-size="11" fill="#A5B4FC">locked_decisions</text>
        <text x="10" y="40" font-family="ui-monospace, monospace" font-size="11" fill="#A5B4FC">forbidden_behaviors</text>
        <text x="10" y="60" font-family="ui-monospace, monospace" font-size="11" fill="#A5B4FC">immutable_facts</text>
        <text x="10" y="80" font-family="ui-monospace, monospace" font-size="11" fill="#A5B4FC">entity_map</text>
        <text x="10" y="100" font-family="ui-monospace, monospace" font-size="11" fill="#A5B4FC">unresolved_items</text>
      </g>
    </g>
  </g>

  <!-- Bottom bar: URL + metric chips -->
  <g transform="translate(80, 560)">
    <text font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#9CA3AF">compactbench.github.io/compactbench</text>
  </g>

  <g transform="translate(780, 548)">
    <g>
      <rect x="0" y="0" width="108" height="28" rx="14" fill="#1F1F26" stroke="#374151" stroke-opacity="0.6"/>
      <text x="54" y="18" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1" fill="#D1D5DB">DRIFT CYCLES</text>
    </g>
    <g transform="translate(120, 0)">
      <rect x="0" y="0" width="124" height="28" rx="14" fill="#1F1F26" stroke="#374151" stroke-opacity="0.6"/>
      <text x="62" y="18" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1" fill="#D1D5DB">HIDDEN RANKED SET</text>
    </g>
    <g transform="translate(256, 0)">
      <rect x="0" y="0" width="120" height="28" rx="14" fill="#1F1F26" stroke="#374151" stroke-opacity="0.6"/>
      <text x="60" y="18" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1" fill="#D1D5DB">DETERMINISTIC</text>
    </g>
  </g>
</svg>
