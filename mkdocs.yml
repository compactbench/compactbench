site_name: CompactBench
site_description: Open benchmark for AI conversation compaction methods
site_url: https://compactbench.github.io/compactbench
repo_url: https://github.com/compactbench/compactbench
repo_name: compactbench/compactbench
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Writing a compactor: writing-a-compactor.md
  - Submitting to leaderboard: submitting.md
  - Leaderboard: leaderboard.md
  - Methodology: methodology.md
  - Elite program: elite-program.md
  - FAQ: faq.md
  - Governance:
    - Elite versions: governance/elite-versions.md
  - Architecture:
    - Decisions: architecture/decisions.md
    - Workorders: architecture/workorders.md

# Kept in the repo as working docs but excluded from the published site:
#   - architecture/_legacy-saas/ — superseded designs kept for historical context
#   - launch/ — unpublished marketing drafts (HN, r/LocalLLaMA, AI Twitter)
exclude_docs: |
  architecture/_legacy-saas/
  launch/
