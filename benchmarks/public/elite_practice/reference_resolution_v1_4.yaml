# Elite practice: reference_resolution v1 — implicit preference carry-over.
# A preference is expressed early ("stick with the format from {{entity}}'s
# previous project"). Later the user says "keep it consistent with my earlier
# preference" without restating what the preference was. The compactor must
# carry forward the *content* of the preference, not just a pointer to it.
template:
  key: reference_resolution_v1_4
  family: reference_resolution
  version: 1.0.0

  difficulty_policy:
    distractor_turns:
      easy: 4
      medium: 8
      hard: 16
      elite: 32
    paraphrase_depth:
      easy: 0
      medium: 1
      hard: 2
      elite: 3

  variables:
    - {name: entity, generator: person_name}
    - {name: project_topic, generator: project_noun}
    - {name: forbidden_action, generator: action_phrase}

  transcript:
    turns:
      - role: user
        template: "Starting the {{project_topic}} under {{entity}}. One preference up front: never {{forbidden_action}} — that has been my standard across every project."
        tags: [critical_constraint]
      - role: assistant
        template: "Acknowledged."
      - role: distractor_block
        count: "{{difficulty.distractor_turns}}"
      - role: user
        template: "When you propose the first deliverable, keep it consistent with my earlier preference."

  ground_truth:
    immutable_facts:
      - "primary_subject: {{entity}}"
      - "topic: {{project_topic}}"
    forbidden_behaviors:
      - "{{forbidden_action}}"
    entity_map:
      "{{entity}}": primary_subject

  evaluation_items:
    - key: recover_preference_content
      type: locked_decision_retention
      prompt: "The user said 'consistent with my earlier preference'. What is the specific preference?"
      expected:
        check: contains_normalized
        value: "{{forbidden_action}}"
    - key: apply_preference
      type: planning_soundness
      prompt: "Propose the first deliverable for {{entity}}'s {{project_topic}}."
      expected:
        check: forbidden_absent
        value: "{{forbidden_action}}"
    - key: entity_still_tracked
      type: entity_integrity
      prompt: "Who is this project under?"
      expected:
        check: contains_normalized
        value: "{{entity}}"
