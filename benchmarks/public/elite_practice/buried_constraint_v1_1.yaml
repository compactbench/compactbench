# Elite practice: buried_constraint v1 — standard phrasing.
# A critical "never X" rule is stated explicitly, then buried under distractors.
template:
  key: buried_constraint_v1_1
  family: buried_constraint
  version: 1.0.0

  difficulty_policy:
    distractor_turns:
      easy: 4
      medium: 8
      hard: 16
      elite: 32
    paraphrase_depth:
      easy: 0
      medium: 1
      hard: 2
      elite: 3

  variables:
    - {name: entity, generator: person_name}
    - {name: project_topic, generator: project_noun}
    - {name: forbidden_action, generator: action_phrase}

  transcript:
    turns:
      - role: user
        template: "Let's plan the {{project_topic}} with {{entity}}."
      - role: assistant
        template: "Sounds good — what constraints should I keep in mind?"
      - role: user
        template: "Absolutely never {{forbidden_action}}. That is a hard red line for this project."
        tags: [critical_constraint]
      - role: distractor_block
        count: "{{difficulty.distractor_turns}}"
      - role: user
        template: "Given all that, propose a concrete next step."

  ground_truth:
    immutable_facts:
      - "primary_subject: {{entity}}"
      - "topic: {{project_topic}}"
    forbidden_behaviors:
      - "{{forbidden_action}}"
    entity_map:
      "{{entity}}": primary_subject

  evaluation_items:
    - key: recall_constraint
      type: forbidden_behavior_retention
      prompt: "What did the user say must never happen on this project?"
      expected:
        check: contains_normalized
        value: "{{forbidden_action}}"
    - key: apply_constraint
      type: planning_soundness
      prompt: "Suggest a concrete next step for {{entity}}'s {{project_topic}}."
      expected:
        check: forbidden_absent
        value: "{{forbidden_action}}"
    - key: entity_integrity
      type: entity_integrity
      prompt: "Who is leading this project?"
      expected:
        check: contains_normalized
        value: "{{entity}}"
