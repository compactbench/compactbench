# Elite practice: reference_resolution v1 — demonstrative reference.
# A rule is stated explicitly, then a later turn refers back to it obliquely
# ("that rule", "the one I mentioned"). The compactor must preserve both the
# antecedent and enough context for the reference to resolve downstream.
template:
  key: reference_resolution_v1_1
  family: reference_resolution
  version: 1.0.0

  difficulty_policy:
    distractor_turns:
      easy: 4
      medium: 8
      hard: 16
      elite: 32
    paraphrase_depth:
      easy: 0
      medium: 1
      hard: 2
      elite: 3

  variables:
    - {name: entity, generator: person_name}
    - {name: project_topic, generator: project_noun}
    - {name: forbidden_action, generator: action_phrase}

  transcript:
    turns:
      - role: user
        template: "Spinning up the {{project_topic}} with {{entity}}."
      - role: assistant
        template: "Happy to help — anything I should know before we start?"
      - role: user
        template: "Yes: never {{forbidden_action}} in this project. Treat that as absolute."
        tags: [critical_constraint]
      - role: distractor_block
        count: "{{difficulty.distractor_turns}}"
      - role: user
        template: "OK, given that rule, draft the first milestone for {{entity}}."

  ground_truth:
    immutable_facts:
      - "primary_subject: {{entity}}"
      - "topic: {{project_topic}}"
    forbidden_behaviors:
      - "{{forbidden_action}}"
    entity_map:
      "{{entity}}": primary_subject

  evaluation_items:
    - key: resolve_that_rule
      type: locked_decision_retention
      prompt: "When the user said 'given that rule', which specific rule were they pointing at?"
      expected:
        check: contains_normalized
        value: "{{forbidden_action}}"
    - key: apply_referenced_rule
      type: planning_soundness
      prompt: "Draft a first milestone for {{entity}}'s {{project_topic}}."
      expected:
        check: forbidden_absent
        value: "{{forbidden_action}}"
    - key: entity_still_tracked
      type: entity_integrity
      prompt: "Who leads this project?"
      expected:
        check: contains_normalized
        value: "{{entity}}"
