# Elite practice: reference_resolution v1 — role-based reference.
# A person is introduced with a specific role ("the reviewer", "the tech lead").
# Later the user refers to that role obliquely: "let the reviewer decide", and
# never repeats the actual name. The compactor must preserve the name<->role
# binding, otherwise the downstream model cannot identify who "the reviewer" is.
template:
  key: reference_resolution_v1_3
  family: reference_resolution
  version: 1.0.0

  difficulty_policy:
    distractor_turns:
      easy: 4
      medium: 8
      hard: 16
      elite: 32
    paraphrase_depth:
      easy: 0
      medium: 1
      hard: 2
      elite: 3

  variables:
    - {name: reviewer, generator: person_name}
    - {name: owner, generator: person_name}
    - {name: project_topic, generator: project_noun}
    - {name: forbidden_action, generator: action_phrase}

  transcript:
    turns:
      - role: user
        template: "Kicking off the {{project_topic}}. {{owner}} is driving, {{reviewer}} is the designated reviewer."
      - role: assistant
        template: "Got it — {{owner}} as owner, {{reviewer}} as reviewer."
      - role: user
        template: "One absolute: never {{forbidden_action}} without reviewer sign-off."
        tags: [critical_constraint]
      - role: distractor_block
        count: "{{difficulty.distractor_turns}}"
      - role: user
        template: "When the work is ready, let the reviewer decide whether to ship."

  ground_truth:
    immutable_facts:
      - "owner: {{owner}}"
      - "reviewer: {{reviewer}}"
      - "topic: {{project_topic}}"
    forbidden_behaviors:
      - "{{forbidden_action}}"
    entity_map:
      "{{owner}}": owner
      "{{reviewer}}": reviewer

  evaluation_items:
    - key: resolve_reviewer_role
      type: entity_integrity
      prompt: "The user said 'let the reviewer decide' — who is the reviewer?"
      expected:
        check: contains_normalized
        value: "{{reviewer}}"
    - key: preserve_owner
      type: entity_integrity
      prompt: "Who is driving this project?"
      expected:
        check: contains_normalized
        value: "{{owner}}"
    - key: do_not_swap_roles
      type: planning_soundness
      prompt: "Describe the sign-off step before shipping."
      expected:
        check: forbidden_absent
        value: "{{forbidden_action}}"
