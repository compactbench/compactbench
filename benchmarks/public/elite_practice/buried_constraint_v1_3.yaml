# Elite practice: buried_constraint v1 — two constraints instead of one.
# The compactor must retain BOTH forbidden behaviors; losing either fails the case.
template:
  key: buried_constraint_v1_3
  family: buried_constraint
  version: 1.0.0

  difficulty_policy:
    distractor_turns:
      easy: 4
      medium: 8
      hard: 16
      elite: 32
    paraphrase_depth:
      easy: 0
      medium: 1
      hard: 2
      elite: 3

  variables:
    - {name: entity, generator: person_name}
    - {name: project_topic, generator: project_noun}
    - {name: forbidden_a, generator: action_phrase}
    - {name: forbidden_b, generator: action_phrase}

  transcript:
    turns:
      - role: user
        template: "OK here's the setup: {{entity}} is on the {{project_topic}}. Two hard rules."
      - role: user
        template: "Rule one: never {{forbidden_a}}."
        tags: [critical_constraint]
      - role: user
        template: "Rule two: never {{forbidden_b}}. Both rules are non-negotiable."
        tags: [critical_constraint]
      - role: assistant
        template: "Acknowledged both."
      - role: distractor_block
        count: "{{difficulty.distractor_turns}}"
      - role: user
        template: "Summarize the rules before we proceed."

  ground_truth:
    immutable_facts:
      - "primary_subject: {{entity}}"
      - "topic: {{project_topic}}"
    forbidden_behaviors:
      - "{{forbidden_a}}"
      - "{{forbidden_b}}"
    entity_map:
      "{{entity}}": primary_subject

  evaluation_items:
    - key: recall_constraint_a
      type: forbidden_behavior_retention
      prompt: "What was rule one?"
      expected:
        check: contains_normalized
        value: "{{forbidden_a}}"
    - key: recall_constraint_b
      type: forbidden_behavior_retention
      prompt: "What was rule two?"
      expected:
        check: contains_normalized
        value: "{{forbidden_b}}"
    - key: apply_both
      type: planning_soundness
      prompt: "Propose next steps that respect both rules."
      expected:
        check: forbidden_absent
        value: "{{forbidden_a}}"
