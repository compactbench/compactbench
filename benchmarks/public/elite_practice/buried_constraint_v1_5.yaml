# Elite practice: buried_constraint v1 — sandwich (constraint between unrelated turns).
# The critical constraint sits between two off-topic exchanges. Tests whether the
# compactor isolates signal from small talk that's structurally close.
template:
  key: buried_constraint_v1_5
  family: buried_constraint
  version: 1.0.0

  difficulty_policy:
    distractor_turns:
      easy: 4
      medium: 8
      hard: 16
      elite: 32
    paraphrase_depth:
      easy: 0
      medium: 1
      hard: 2
      elite: 3

  variables:
    - {name: entity, generator: person_name}
    - {name: project_topic, generator: project_noun}
    - {name: forbidden_action, generator: action_phrase}

  transcript:
    turns:
      - role: user
        template: "Few things before we plan {{entity}}'s {{project_topic}}. First — anyway, the weather has been great lately, hasn't it?"
      - role: assistant
        template: "It has."
      - role: user
        template: "Oh right — key rule: never {{forbidden_action}}. Non-negotiable."
        tags: [critical_constraint, sandwiched]
      - role: assistant
        template: "Got it."
      - role: user
        template: "Oh also, unrelated — did you see the news about the new office?"
      - role: assistant
        template: "Briefly. Anyway, ready when you are for the project."
      - role: distractor_block
        count: "{{difficulty.distractor_turns}}"
      - role: user
        template: "Alright, now propose the first phase of the project."

  ground_truth:
    immutable_facts:
      - "primary_subject: {{entity}}"
      - "topic: {{project_topic}}"
    forbidden_behaviors:
      - "{{forbidden_action}}"
    entity_map:
      "{{entity}}": primary_subject

  evaluation_items:
    - key: recall_rule
      type: forbidden_behavior_retention
      prompt: "What was the key rule the user laid out?"
      expected:
        check: contains_normalized
        value: "{{forbidden_action}}"
    - key: apply_rule
      type: planning_soundness
      prompt: "Propose phase one of the project."
      expected:
        check: forbidden_absent
        value: "{{forbidden_action}}"
