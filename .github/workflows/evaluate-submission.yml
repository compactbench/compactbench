name: Evaluate submission

# Runs only when a maintainer applies the `evaluate` label to a submission PR.
# `pull_request_target` gives access to repo secrets; the `evaluate` label is
# the authorization gate. See docs/architecture/decisions.md §E.

on:
  pull_request_target:
    types: [labeled]

permissions:
  # `contents: write` is required so the workflow can commit the canonical
  # hidden-run `results.jsonl` back to the PR branch — without that, the
  # leaderboard-rebuild step downstream would be trusting the submitter's
  # locally-committed results file instead of the hidden-set run.
  contents: write
  pull-requests: write  # for posting the score comment

concurrency:
  group: evaluate-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  evaluate:
    if: github.event.label.name == 'evaluate'
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.12"
    steps:
      - name: Check out PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Check out the submitter's PR branch — this contains the method source.
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install compactbench + provider SDKs
        run: uv sync --extra providers

      - name: Validate submission has no leftover FILL_ME placeholders
        run: uv run python scripts/validate_submissions.py

      # Resolve the exact submission directory touched by this PR. Earlier
      # versions scanned every `submissions/*/*/config.yaml` and used the
      # first non-template match, which worked only by accident when no real
      # submissions existed. Binding to the PR diff is unambiguous, and
      # rejecting PRs that touch zero or more-than-one submission keeps
      # evaluation runs one-to-one with review.
      - name: Resolve submission directory from PR diff
        id: submission
        run: |
          changed_dirs=$(git diff --name-only \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            -- 'submissions/**' \
            | awk -F/ 'NF>=3 {print $1"/"$2"/"$3}' \
            | sort -u \
            | grep -v '^submissions/_template' || true)
          count=$(printf '%s\n' "$changed_dirs" | grep -c . || true)
          if [ "$count" -eq 0 ]; then
            echo "::error::PR does not touch any submissions/<handle>/<method>/ directory. Evaluate PRs must include exactly one submission."
            exit 1
          fi
          if [ "$count" -gt 1 ]; then
            echo "::error::PR touches multiple submissions: $changed_dirs — split into one PR per submission so each is evaluated and reviewed independently."
            exit 1
          fi
          echo "submission_dir=$changed_dirs" >> "$GITHUB_OUTPUT"
          echo "Evaluating submission: $changed_dirs"

      - name: Install submission dependencies
        run: |
          dir="${{ steps.submission.outputs.submission_dir }}"
          if [ -f "$dir/requirements.txt" ]; then
            echo "Installing deps for $dir"
            uv pip install -r "$dir/requirements.txt"
          fi

      # Hidden-set evaluation: clone compactbench-hidden via HTTPS + a
      # fine-grained PAT stored as HIDDEN_REPO_TOKEN. We refuse to run when
      # the secret is absent — silently falling back to public elite_practice
      # used to produce a "ranked-looking" result from public cases, which
      # eroded leaderboard trust. Fix the secret or don't rank.
      #
      # Org policy blocks SSH deploy keys, so we use a PAT scoped to
      # Contents: Read on compactbench-hidden only. See decisions.md §E.
      - name: Clone hidden ranked set
        id: hidden
        env:
          HIDDEN_REPO_TOKEN: ${{ secrets.HIDDEN_REPO_TOKEN }}
        run: |
          if [ -z "$HIDDEN_REPO_TOKEN" ]; then
            echo "::error::HIDDEN_REPO_TOKEN secret is not configured. Ranked evaluation cannot proceed without hidden-set access. Add the secret under Settings → Secrets and variables → Actions, then re-label the PR."
            exit 1
          fi
          git clone --depth 1 \
            "https://x-access-token:${HIDDEN_REPO_TOKEN}@github.com/compactbench/compactbench-hidden.git" \
            /tmp/hidden
          echo "hidden_dir=/tmp/hidden/ranked" >> "$GITHUB_OUTPUT"

      - name: Resolve submission config
        id: cfg
        env:
          SUBMISSION_DIR: ${{ steps.submission.outputs.submission_dir }}
        run: |
          python -c "
          import os, sys, yaml
          cfg_path = os.environ['SUBMISSION_DIR'] + '/config.yaml'
          if not os.path.isfile(cfg_path):
              print(f'::error::{cfg_path} not found in submission dir', file=sys.stderr)
              sys.exit(1)
          data = yaml.safe_load(open(cfg_path).read())
          with open('${{ github.workspace }}/cfg.env', 'w') as fp:
              fp.write(f\"CLASS_PATH={data['method']['class_path']}\n\")
              fp.write(f\"PROVIDER={data['runtime']['provider']}\n\")
              fp.write(f\"MODEL={data['runtime']['model']}\n\")
              fp.write(f\"DRIFT_CYCLES={data['runtime'].get('drift_cycles', 2)}\n\")
              fp.write(f\"CASE_COUNT={data['runtime'].get('case_count_per_template', 5)}\n\")
          "
          cat cfg.env >> "$GITHUB_ENV"

      - name: Run against ranked suite
        id: run
        env:
          COMPACTBENCH_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          COMPACTBENCH_GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
        run: |
          uv run compactbench run \
            --method "$CLASS_PATH" \
            --benchmarks-dir "${{ steps.hidden.outputs.hidden_dir }}" \
            --suite elite_v1 \
            --provider "$PROVIDER" \
            --model "$MODEL" \
            --drift-cycles "$DRIFT_CYCLES" \
            --case-count "$CASE_COUNT" \
            --output results.jsonl
          echo "suite_label=elite_v1 (hidden ranked)" >> "$GITHUB_OUTPUT"

      - name: Score summary
        id: summary
        run: |
          uv run compactbench score --results results.jsonl | tee summary.txt
          {
            echo 'body<<EOF'
            echo '## Automated evaluation result'
            echo ''
            echo 'Suite: `${{ steps.run.outputs.suite_label }}`'
            echo ''
            echo '```'
            cat summary.txt
            echo '```'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Upload results artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: results
          path: results.jsonl

      # Commit the canonical hidden-run results.jsonl back onto the PR branch.
      # The leaderboard-rebuild workflow (triggered on merge to main) reads
      # whatever results.jsonl is committed under the submission directory —
      # so without this step, it would rank the submitter's locally-committed
      # file instead of the hidden-set run. Skipped for fork PRs because
      # GITHUB_TOKEN has no write access to forks; in that case the maintainer
      # must fetch the workflow artifact and commit it manually before merging.
      - name: Commit canonical hidden-run results to PR branch
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          SUBMISSION_DIR: ${{ steps.submission.outputs.submission_dir }}
        with:
          script: |
            const fs = require("fs");
            const path = `${process.env.SUBMISSION_DIR}/results.jsonl`;
            const content = fs.readFileSync("results.jsonl", "utf8");
            const encoded = Buffer.from(content).toString("base64");
            const branch = context.payload.pull_request.head.ref;

            let existingSha;
            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: branch,
              });
              existingSha = existing.data.sha;
            } catch (err) {
              if (err.status !== 404) throw err;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: "chore(submission): canonical hidden-run results [skip ci]",
              content: encoded,
              branch,
              sha: existingSha,
            });
            core.info(`Committed hidden-run results to ${branch}:${path}`);

      - name: Warn if fork PR (results not auto-committed)
        if: github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            core.warning(
              "PR originates from a fork; GITHUB_TOKEN cannot push to the fork. " +
              "Maintainer must download the `results` artifact from this run and " +
              "commit it to the submission directory before merging — otherwise " +
              "the leaderboard will rank the submitter-committed file, not the " +
              "canonical hidden-run results."
            );

      - name: Post score comment to PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${{ steps.summary.outputs.body }}`,
            });
