name: Evaluate submission

# Runs only when a maintainer applies the `evaluate` label to a submission PR.
# `pull_request_target` gives access to repo secrets; the `evaluate` label is
# the authorization gate. See docs/architecture/decisions.md §E.

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write  # for posting the score comment

concurrency:
  group: evaluate-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  evaluate:
    if: github.event.label.name == 'evaluate'
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.12"
    steps:
      - name: Check out PR head
        uses: actions/checkout@v6
        with:
          # Check out the submitter's PR branch — this contains the method source.
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install compactbench + provider SDKs
        run: uv sync --extra providers

      - name: Install submission dependencies
        run: |
          changed_dirs=$(git diff --name-only \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            -- 'submissions/**' \
            | awk -F/ '{print $1"/"$2"/"$3}' | sort -u)
          for dir in $changed_dirs; do
            if [ -f "$dir/requirements.txt" ]; then
              echo "Installing deps for $dir"
              uv pip install -r "$dir/requirements.txt"
            fi
          done

      # Hidden-set evaluation: clone compactbench-hidden if the deploy key is
      # configured. Fall back to public `elite_practice` when it isn't, so the
      # workflow works for maintainers setting things up for the first time.
      - name: Clone hidden ranked set
        id: hidden
        env:
          HIDDEN_REPO_DEPLOY_KEY: ${{ secrets.HIDDEN_REPO_DEPLOY_KEY }}
        run: |
          if [ -z "$HIDDEN_REPO_DEPLOY_KEY" ]; then
            echo "hidden_available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No HIDDEN_REPO_DEPLOY_KEY secret configured — falling back to public elite_practice."
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$HIDDEN_REPO_DEPLOY_KEY" > ~/.ssh/hidden_key
          chmod 600 ~/.ssh/hidden_key
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND="ssh -i ~/.ssh/hidden_key -o IdentitiesOnly=yes" \
            git clone --depth 1 git@github.com:compactbench/compactbench-hidden.git /tmp/hidden
          echo "hidden_available=true" >> "$GITHUB_OUTPUT"
          echo "hidden_dir=/tmp/hidden/ranked" >> "$GITHUB_OUTPUT"

      - name: Resolve submission config
        id: cfg
        run: |
          python -c "
          from pathlib import Path
          import sys
          import yaml
          for cfg in Path('submissions').rglob('config.yaml'):
              if '_template' in cfg.parts:
                  continue
              data = yaml.safe_load(cfg.read_text())
              with open('${{ github.workspace }}/cfg.env', 'w') as fp:
                  fp.write(f\"CLASS_PATH={data['method']['class_path']}\n\")
                  fp.write(f\"PROVIDER={data['runtime']['provider']}\n\")
                  fp.write(f\"MODEL={data['runtime']['model']}\n\")
                  fp.write(f\"DRIFT_CYCLES={data['runtime'].get('drift_cycles', 2)}\n\")
                  fp.write(f\"CASE_COUNT={data['runtime'].get('case_count_per_template', 5)}\n\")
              sys.exit(0)
          "
          cat cfg.env >> "$GITHUB_ENV"

      - name: Run against ranked suite
        id: run
        env:
          COMPACTBENCH_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          COMPACTBENCH_GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
        run: |
          if [ "${{ steps.hidden.outputs.hidden_available }}" = "true" ]; then
            uv run compactbench run \
              --method "$CLASS_PATH" \
              --benchmarks-dir "${{ steps.hidden.outputs.hidden_dir }}" \
              --suite elite_v1 \
              --provider "$PROVIDER" \
              --model "$MODEL" \
              --drift-cycles "$DRIFT_CYCLES" \
              --case-count "$CASE_COUNT" \
              --output results.jsonl
            echo "suite_label=elite_v1 (hidden ranked)" >> "$GITHUB_OUTPUT"
          else
            uv run compactbench run \
              --method "$CLASS_PATH" \
              --suite elite_practice \
              --provider "$PROVIDER" \
              --model "$MODEL" \
              --drift-cycles "$DRIFT_CYCLES" \
              --case-count "$CASE_COUNT" \
              --output results.jsonl
            echo "suite_label=elite_practice (public stand-in)" >> "$GITHUB_OUTPUT"
          fi

      - name: Score summary
        id: summary
        run: |
          uv run compactbench score --results results.jsonl | tee summary.txt
          {
            echo 'body<<EOF'
            echo '## Automated evaluation result'
            echo ''
            echo 'Suite: `${{ steps.run.outputs.suite_label }}`'
            echo ''
            echo '```'
            cat summary.txt
            echo '```'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Upload results artifact
        uses: actions/upload-artifact@v7
        with:
          name: results
          path: results.jsonl

      - name: Post score comment to PR
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${{ steps.summary.outputs.body }}`,
            });
